# GitHub App Manifest
# https://docs.github.com/en/apps/sharing-github-apps/registering-a-github-app-from-a-manifest
#
# Use this as a reference when configuring the GitHub App in the developer settings.
# It is NOT automatically applied — you must set these values manually in the GitHub UI
# or use the manifest flow endpoint to register programmatically.

name: PRism AI Reviewer
description: Multi-pass AI code review with inline findings and one-click fix suggestions.
url: https://github.com/Arochio/prism-ai-reviewer
public: true

default_events:
  - pull_request
  - push
  - issue_comment
  - pull_request_review_comment
  - pull_request_review
  - installation
  - marketplace_purchase

default_permissions:
  pull_requests: write        # post review comments and inline suggestions
  contents: read              # read file contents, trees, and commits
  issues: write               # post PR summary comments (issues API)
  metadata: read              # required for all GitHub Apps

hook_attributes:
  url: https://YOUR_DOMAIN/webhook
  active: true

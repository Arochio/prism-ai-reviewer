<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 965 482" width="965" height="482">
  <defs>
    <!-- Base dark gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="55%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

    <!-- Spectrum glow gradient left-to-right -->
    <linearGradient id="spectrum" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ff6b6b" stop-opacity="0.7"/>
      <stop offset="20%"  stop-color="#ffa94d" stop-opacity="0.7"/>
      <stop offset="40%"  stop-color="#ffd43b" stop-opacity="0.7"/>
      <stop offset="60%"  stop-color="#69db7c" stop-opacity="0.7"/>
      <stop offset="80%"  stop-color="#74c0fc" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#b197fc" stop-opacity="0.7"/>
    </linearGradient>

    <!-- Radial glow behind prism -->
    <radialGradient id="prismGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#58a6ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Noise texture filter -->
    <filter id="noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noiseOut"/>
      <feColorMatrix type="saturate" values="0" in="noiseOut" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.06"/>
    </pattern>

    <!-- Dot pattern -->
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>

    <clipPath id="cardClip">
      <rect width="965" height="482" rx="0"/>
    </clipPath>
  </defs>

  <g clip-path="url(#cardClip)">
    <!-- Base background -->
    <rect width="965" height="482" fill="url(#bg)"/>

    <!-- Grid texture -->
    <rect width="965" height="482" fill="url(#grid)"/>

    <!-- Dot texture overlay -->
    <rect width="965" height="482" fill="url(#dots)"/>

    <!-- Noise texture -->
    <rect width="965" height="482" fill="#0d1117" opacity="0.01" filter="url(#noise)"/>

    <!-- Prism glow blob (right half) -->
    <ellipse cx="660" cy="241" rx="300" ry="260" fill="url(#prismGlow)"/>

    <!-- Spectrum band (horizontal across right) -->
    <rect x="520" y="222" width="445" height="6" rx="3" fill="url(#spectrum)" opacity="0.85"/>

    <!-- ── PRISM (right side) ── -->
    <!-- Outer glow triangle -->
    <polygon points="620,90 790,370 450,370"
      fill="none"
      stroke="#58a6ff"
      stroke-width="1"
      opacity="0.12"/>

    <!-- Prism body -->
    <polygon points="620,95 786,365 454,365"
      fill="#161b22"
      stroke="#30363d"
      stroke-width="1.5"
      stroke-linejoin="round"/>

    <!-- Inner prism highlight (top face) -->
    <polygon points="620,95 786,365 454,365"
      fill="none"
      stroke="#58a6ff"
      stroke-width="1"
      stroke-linejoin="round"
      opacity="0.35"/>

    <!-- Internal refraction lines (inside prism) -->
    <line x1="555" y1="290" x2="620" y2="160" stroke="#74c0fc" stroke-width="0.8" opacity="0.15"/>
    <line x1="590" y1="310" x2="620" y2="160" stroke="#74c0fc" stroke-width="0.8" opacity="0.12"/>
    <line x1="625" y1="320" x2="620" y2="160" stroke="#74c0fc" stroke-width="0.8" opacity="0.10"/>

    <!-- Incoming light ray -->
    <line x1="380" y1="228" x2="454" y2="228"
      stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
    <!-- Arrow tip -->
    <polygon points="454,228 444,222.5 444,233.5" fill="white" opacity="0.85"/>

    <!-- Refracted rays out the right of prism -->
    <!-- Red -->
    <line x1="786" y1="210" x2="900" y2="155"
      stroke="#ff6b6b" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <!-- Orange -->
    <line x1="786" y1="225" x2="900" y2="187"
      stroke="#ffa94d" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <!-- Yellow -->
    <line x1="786" y1="238" x2="900" y2="218"
      stroke="#ffd43b" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <!-- Green -->
    <line x1="786" y1="250" x2="900" y2="249"
      stroke="#69db7c" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <!-- Blue -->
    <line x1="786" y1="262" x2="900" y2="280"
      stroke="#74c0fc" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <!-- Violet -->
    <line x1="786" y1="276" x2="900" y2="314"
      stroke="#b197fc" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>

    <!-- PR label inside prism -->
    <text x="620" y="252"
      font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace"
      font-size="32" font-weight="700"
      fill="#58a6ff" text-anchor="middle" opacity="0.6">PR</text>

    <!-- ── LEFT: Text content ── -->

    <!-- Eyebrow label -->
    <rect x="52" y="120" width="148" height="24" rx="4" fill="#58a6ff" opacity="0.12"/>
    <text x="126" y="137"
      font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
      font-size="11" font-weight="600" letter-spacing="2"
      fill="#58a6ff" text-anchor="middle" opacity="0.9">GITHUB APP</text>

    <!-- Main headline -->
    <text x="52" y="196"
      font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
      font-size="54" font-weight="800" letter-spacing="-1.5"
      fill="#ffffff">PRism<tspan fill="#58a6ff">AI</tspan></text>
    <text x="52" y="248"
      font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
      font-size="54" font-weight="800" letter-spacing="-1.5"
      fill="#ffffff">Reviewer</text>

    <!-- Divider line (spectrum colored) -->
    <rect x="52" y="268" width="200" height="3" rx="2" fill="url(#spectrum)"/>

    <!-- Subheadline -->
    <text x="52" y="302"
      font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
      font-size="16" font-weight="400"
      fill="#8b949e">Multi-pass AI code review.</text>
    <text x="52" y="324"
      font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
      font-size="16" font-weight="400"
      fill="#8b949e">Inline findings. Fix suggestions.</text>

    <!-- Feature pills -->
    <g transform="translate(52, 352)">
      <!-- Bug Pass -->
      <rect x="0" y="0" width="90" height="26" rx="13" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="45" y="17.5"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="11" font-weight="500"
        fill="#ff6b6b" text-anchor="middle">Bug Pass</text>

      <!-- Design Pass -->
      <rect x="98" y="0" width="104" height="26" rx="13" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="150" y="17.5"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="11" font-weight="500"
        fill="#ffd43b" text-anchor="middle">Design Pass</text>

      <!-- Risk Scoring -->
      <rect x="210" y="0" width="102" height="26" rx="13" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="261" y="17.5"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="11" font-weight="500"
        fill="#69db7c" text-anchor="middle">Risk Scoring</text>

      <!-- Fix Suggestions -->
      <rect x="0" y="34" width="118" height="26" rx="13" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="59" y="51.5"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="11" font-weight="500"
        fill="#74c0fc" text-anchor="middle">Fix Suggestions</text>

      <!-- RAG Context -->
      <rect x="126" y="34" width="98" height="26" rx="13" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="175" y="51.5"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="11" font-weight="500"
        fill="#b197fc" text-anchor="middle">RAG Context</text>
    </g>

    <!-- Subtle bottom fade -->
    <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0e17" stop-opacity="0.6"/>
    </linearGradient>
    <rect width="965" height="80" y="402" fill="url(#bottomFade)"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" fill="#0d1117" rx="40"/>

  <!-- Prism triangle (centered, pointing up) -->
  <!-- Triangle outline glow -->
  <polygon points="200,68 315,268 85,268"
    fill="none"
    stroke="#ffffff"
    stroke-width="3"
    stroke-linejoin="round"
    opacity="0.15"/>

  <!-- Triangle fill -->
  <polygon points="200,72 312,265 88,265"
    fill="#161b22"
    stroke="#58a6ff"
    stroke-width="2.5"
    stroke-linejoin="round"/>

  <!-- Incoming light ray (left side of prism) -->
  <line x1="68" y1="168" x2="144" y2="168"
    stroke="white"
    stroke-width="2.5"
    stroke-linecap="round"
    opacity="0.9"/>

  <!-- Refracted rays coming out the right side (spectrum) -->
  <!-- Red -->
  <line x1="258" y1="155" x2="338" y2="118"
    stroke="#ff6b6b"
    stroke-width="2.5"
    stroke-linecap="round"/>
  <!-- Orange -->
  <line x1="261" y1="165" x2="345" y2="148"
    stroke="#ffa94d"
    stroke-width="2.5"
    stroke-linecap="round"/>
  <!-- Yellow -->
  <line x1="262" y1="175" x2="345" y2="175"
    stroke="#ffd43b"
    stroke-width="2.5"
    stroke-linecap="round"/>
  <!-- Green -->
  <line x1="261" y1="185" x2="345" y2="202"
    stroke="#69db7c"
    stroke-width="2.5"
    stroke-linecap="round"/>
  <!-- Blue -->
  <line x1="258" y1="195" x2="340" y2="228"
    stroke="#74c0fc"
    stroke-width="2.5"
    stroke-linecap="round"/>
  <!-- Violet -->
  <line x1="254" y1="205" x2="332" y2="252"
    stroke="#b197fc"
    stroke-width="2.5"
    stroke-linecap="round"/>

  <!-- PR label inside the prism (subtle) -->
  <text x="200" y="196"
    font-family="ui-monospace, 'Cascadia Code', monospace"
    font-size="26"
    font-weight="700"
    fill="#58a6ff"
    text-anchor="middle"
    opacity="0.85">PR</text>

  <!-- App name -->
  <text x="200" y="320"
    font-family="ui-sans-serif, system-ui, sans-serif"
    font-size="36"
    font-weight="800"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="-1">PRism<tspan fill="#58a6ff">AI</tspan></text>

  <!-- Tagline -->
  <text x="200" y="350"
    font-family="ui-sans-serif, system-ui, sans-serif"
    font-size="14"
    font-weight="400"
    fill="#8b949e"
    text-anchor="middle"
    letter-spacing="2">CODE  REVIEW</text>
</svg>

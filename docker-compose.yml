services:
  postgres:
    image: postgres:16-alpine
    container_name: prism-postgres
    environment:
      POSTGRES_USER: prism
      POSTGRES_PASSWORD: prism
      POSTGRES_DB: prism
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  prism-ai-reviewer:
    build:
      context: .
      dockerfile: Dockerfile
    image: prism-ai-reviewer:latest
    container_name: prism-ai-reviewer
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://prism:prism@postgres:5432/prism
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    container_name: prism-ai-reviewer-ngrok
    command: ["http", "prism-ai-reviewer:3000"]
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      - prism-ai-reviewer
    restart: unless-stopped
    profiles:
      - tunnel

volumes:
  pgdata:
